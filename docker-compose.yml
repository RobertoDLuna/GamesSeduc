version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: seduc_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha123}
      POSTGRES_DB: ${DB_NAME:-jogos_seduc}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: seduc_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Traefik será configurado para valer no ambiente Swarm, 
  # mas aqui deixamos a base pronta para o proxy reverso.
  traefik:
    image: traefik:v2.10
    container_name: seduc_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080" # Dashboard do Traefik
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

volumes:
  postgres_data:
